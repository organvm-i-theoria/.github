name: Python CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint with ruff
        run: ruff check --output-format=github .

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Test with pytest
        run: pytest tests/ -v --tb=short

  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate YAML configs
        run: |
          python -c "
          import yaml, glob, sys
          errors = 0
          for f in glob.glob('**/*.yml', recursive=True) + glob.glob('**/*.yaml', recursive=True):
              try:
                  with open(f) as fh:
                      yaml.safe_load(fh)
              except Exception as e:
                  print(f'::error file={f}::{e}')
                  errors += 1
          if errors:
              sys.exit(1)
          print(f'::notice::All YAML files valid')
          "

      - name: Validate seed.yaml
        run: |
          python -c "
          import yaml
          with open('seed.yaml') as f:
              seed = yaml.safe_load(f)
          assert seed.get('organ'), 'Missing organ field'
          assert seed.get('repo'), 'Missing repo field'
          print('::notice::seed.yaml valid')
          "
